syntax = "proto3";
option go_package = "/gen";

message BankQuestion {
    string id = 1;
    string question = 2;
    repeated string options = 3;
    int32 correct_answer = 4;
    int32 time_limit = 5;
}

message GetRandomQuestionsRequest {
    int32 count = 1;
}

message GetRandomQuestionsResponse {
    repeated BankQuestion questions = 1;
}

message GetQuestionsByIdsRequest {
    repeated string ids = 1;
}

message GetQuestionsByIdsResponse {
    repeated BankQuestion questions = 1;
}

service QuizBankService {
    rpc GetRandomQuestions(GetRandomQuestionsRequest) returns (GetRandomQuestionsResponse);
    rpc GetQuestionsByIds(GetQuestionsByIdsRequest) returns (GetQuestionsByIdsResponse);
}
